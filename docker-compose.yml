services:
   streamlit:
      build:
         context: .
      ports:
         - "8501:8501"
      volumes:
         - .:/app
      depends_on:
         - db


   db:
      image: postgres:15
      environment:
         POSTGRES_USER: user
         POSTGRES_PASSWORD: password
         POSTGRES_DB: mydb
      volumes:
         - db_data:/var/lib/postgresql/data

volumes:
  db_data: